<!DOCTYPE html>
<html>
<head>
<title>Game Hub</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

.game{
  background:#222;
  margin:20px;
  padding:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Free Games</h1>

<div class="game" onclick="playGame()">Play Game</div>
<div class="game" onclick="lockedGame()">🔒 Locked Game</div>
<div class="game" onclick="redirectPuzzle()">🧩 Puzzle</div>
<div class="game" onclick="videoGame()">🎥 Video</div>

<script>
function playGame(){
  document.body.innerHTML = "<h1>Launching...</h1>";

  setTimeout(()=>{
    document.body.innerHTML = "<h1>Why did you pick this one?</h1>";
    document.body.style.color = "red";
  },2000);
}

function lockedGame(){
  let pass = prompt("Enter Password:");

  if(pass === "1234"){
    document.body.innerHTML = "<h1>Access Granted...</h1>";
  } else {
    alert("Wrong password.");
  }
}

function redirectPuzzle(){
  document.body.innerHTML = "<h1>Find the hidden page...</h1>";

  setTimeout(()=>{
    window.location.href = "secret.html";
  },2000);
}

function videoGame(){
  document.body.innerHTML = `
    <h1>Loading Recording...</h1>
    <video width="600" autoplay controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  `;
}
</script>

</body>
</html>
