<!DOCTYPE html>
<html>
<head>
<title>Free Games</title>

<style>
body{
  background:#111;
  color:white;
  font-family: Arial;
  margin:0;
}

header{
  text-align:center;
  padding:50px;
}

.games{
  padding:50px;
}

.game{
  background:#222;
  margin:20px;
  padding:20px;
  cursor:pointer;
  border:1px solid #333;
}

.locked{
  color:gray;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<header>
  <h1>🎮 FREE GAME HUB</h1>
  <p>Scroll down to play</p>
</header>

<div class="games">

  <div class="game" onclick="playGame('safe')">
    😊 Happy Jump (FREE)
  </div>

  <div class="game locked" onclick="lockedGame()">
    🔒 Night Watch (PASSWORD REQUIRED)
  </div>

  <div class="game locked" onclick="redirectPuzzle()">
    🔒 Forgotten File (???)
  </div>

  <div class="game locked" onclick="videoGame()">
    🎥 Lost Recording
  </div>

</div>

<script>
function playGame(type){
  document.body.innerHTML = "<h1>Launching...</h1>";

  setTimeout(()=>{
    document.body.innerHTML = "<h1>Why did you pick this one?</h1>";
    document.body.style.color = "red";
  },2000);
}
