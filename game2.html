<!DOCTYPE html>
<html>
<head>
<title>Memory Test</title>
<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}
</style>
</head>

<body>

<h1 id="text">Remember this number...</h1>
<h2 id="number"></h2>

<script>
let code = Math.floor(Math.random()*900 + 100);

document.getElementById("number").innerText = code;

setTimeout(()=>{
  let answer = prompt("Enter the number:");

  if(answer == code){
    document.body.innerHTML = `
      <h1>Correct...</h1>
      <p>fragment recovered: 31</p>
    `;
  } else {
    document.body.innerHTML = `
      <h1>Wrong...</h1>
      <p style="color:red;">memory failure</p>
    `;
  }
}, 3000);
</script>

</body>
</html>
