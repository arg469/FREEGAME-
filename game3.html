<!DOCTYPE html>
<html>
<head>
<title>Find It</title>
<style>
body{
  background:black;
  margin:0;
}
#area{
  width:100%;
  height:100vh;
  position:relative;
}
#hidden{
  width:20px;
  height:20px;
  position:absolute;
  top:60%;
  left:40%;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="area" onclick="fail()">
  <div id="hidden" onclick="win(event)"></div>
</div>

<script>
function win(event){
  event.stopPropagation();

  document.body.innerHTML = `
    <h1 style="color:white;text-align:center;">You found it...</h1>
    <p style="color:red;text-align:center;">fragment recovered: X</p>
  `;
}

function fail(){
  document.body.innerHTML = `
    <h1 style="color:white;text-align:center;">missed...</h1>
  `;
}
</script>

</body>
</html>
