<!DOCTYPE html>
<html>
<head>
<title>Reaction Test</title>
<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
button{
  padding:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>Click the button 10 times</h1>
<button onclick="countClick()">CLICK</button>
<p id="count">0</p>

<script>
let clicks = 0;

function countClick(){
  clicks++;
  document.getElementById("count").innerText = clicks;

  if(clicks >= 10){
    document.body.innerHTML = `
      <h1>You win...</h1>
      <p>fragment recovered: 73</p>
      <p style="color:red;">it let you win</p>
    `;
  }
}
</script>

</body>
</html>
